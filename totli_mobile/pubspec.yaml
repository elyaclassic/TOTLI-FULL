name: totli_mobile
description: TOTLI HOLVA - Agent va Haydovchi mobil ilovasi
publish_to: 'none'
version: 2.0.4+52

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  geolocator: ^11.0.0
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.2
  battery_plus: ^5.0.2
  url_launcher: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.8.3
  connectivity_plus: ^5.0.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  flutter_plugin_android_lifecycle: ^2.0.24

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

# APK icon yaratish uchun: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#017449"
  adaptive_icon_foreground: "assets/images/logo.png"
