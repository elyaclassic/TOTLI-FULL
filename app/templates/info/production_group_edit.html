{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-pencil"></i> Guruhni tahrirlash: {{ group.name }}</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="/info/production-groups/edit/{{ group.id }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Guruh nomi *</label>
                        <input type="text" class="form-control" name="name" value="{{ group.name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Operator *</label>
                        <select class="form-select" name="operator_id" required>
                            {% for e in employees %}
                            <option value="{{ e.id }}" {% if e.id == group.operator_id %}selected{% endif %}>{{ e.full_name }} ({{ e.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Bo'lak narxi (umumiy/default)</label>
                        <select class="form-select" name="piecework_task_id" id="defaultTask">
                            <option value="">— Tanlang —</option>
                            {% for t in piecework_tasks %}
                            <option value="{{ t.id }}" data-price="{{ t.price_per_unit or 0 }}" {% if group.piecework_task_id == t.id %}selected{% endif %}>{{ t.name or t.code }} — {{ "{:,.0f}".format(t.price_per_unit or 0) }} / {{ t.unit_name or 'kg' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Qiyom kg ga kiritilsin</label>
                        <select class="form-select" name="include_qiyom">
                            <option value="1" {% if group.include_qiyom %}selected{% endif %}>Ha</option>
                            <option value="0" {% if not group.include_qiyom %}selected{% endif %}>Yo'q</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Guruh a'zolari va narxlari</label>
                        <div class="border rounded p-2" style="max-height: 400px; overflow: auto;">
                            <table class="table table-sm mb-0">
                                <thead>
                                    <tr>
                                        <th style="width:30px;"></th>
                                        <th>Xodim</th>
                                        <th>Lavozim</th>
                                        <th style="width:150px;">Narx (so'm/kg)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% set member_ids = group.members|map(attribute='id')|list %}
                                    {% for e in employees %}
                                    {% set is_member = e.id in member_ids %}
                                    <tr class="{{ 'table-success' if is_member else '' }}">
                                        <td>
                                            <input class="form-check-input member-check" type="checkbox" name="member_ids" value="{{ e.id }}" id="m_{{ e.id }}" {% if is_member %}checked{% endif %} onchange="togglePrice(this)">
                                        </td>
                                        <td><label for="m_{{ e.id }}" class="mb-0" style="cursor:pointer;">{{ e.full_name }} ({{ e.code }})</label></td>
                                        <td><small class="text-muted">{{ e.position or '—' }}</small></td>
                                        <td>
                                            <input type="number" name="price_{{ e.id }}" class="form-control form-control-sm price-input"
                                                   value="{{ member_prices.get(e.id, 0) if member_prices is defined and is_member else 0 }}"
                                                   step="1" min="0" placeholder="0"
                                                   {% if not is_member %}disabled{% endif %}>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Saqlash</button>
                        <a href="/info/production-groups" class="btn btn-secondary">Bekor</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
function togglePrice(checkbox) {
    var tr = checkbox.closest('tr');
    var priceInput = tr.querySelector('.price-input');
    if (checkbox.checked) {
        priceInput.disabled = false;
        tr.classList.add('table-success');
        if (!priceInput.value || priceInput.value == '0') {
            var sel = document.getElementById('defaultTask');
            var opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.price) priceInput.value = opt.dataset.price;
        }
    } else {
        priceInput.disabled = true;
        priceInput.value = '0';
        tr.classList.remove('table-success');
    }
}
</script>
{% endblock %}
