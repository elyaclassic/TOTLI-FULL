{% extends "base.html" %}

{% block content %}
<div class="container-fluid">

    <div class="page-header mb-3">
        <h5 class="mb-0"><i class="bi bi-pencil"></i> Davomat yozuvini tahrirlash</h5>
        <a href="/employees/attendance/records?start_date={{ start_date }}&end_date={{ end_date }}" class="top-btn"><i class="bi bi-arrow-left"></i> Ro'yxatga</a>
    </div>

    <div class="filter-card mb-3">
        <p class="text-muted small mb-3">{{ record.employee.full_name }} — {{ record.date.strftime('%d.%m.%Y') }}</p>
        <form method="post" action="/employees/attendance/records/edit/{{ record.id }}">
            <input type="hidden" name="start_date" value="{{ start_date }}">
            <input type="hidden" name="end_date" value="{{ end_date }}">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label small">Keldi</label>
                    <input type="time" name="check_in" class="form-control form-control-sm" value="{% if record.check_in %}{{ record.check_in.strftime('%H:%M') }}{% endif %}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Ketdi</label>
                    <input type="time" name="check_out" class="form-control form-control-sm" value="{% if record.check_out %}{{ record.check_out.strftime('%H:%M') }}{% endif %}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Soat</label>
                    <input type="number" name="hours_worked" class="form-control form-control-sm" step="0.01" min="0" value="{{ record.hours_worked if record.hours_worked is not none else '' }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Holat</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="present" {% if record.status == 'present' %}selected{% endif %}>Keldi</option>
                        <option value="absent" {% if record.status == 'absent' %}selected{% endif %}>Kelmadi</option>
                        <option value="leave" {% if record.status == 'leave' %}selected{% endif %}>Ta'til</option>
                        <option value="kasallik" {% if record.status == 'kasallik' %}selected{% endif %}>Kasallik</option>
                        <option value="tatil" {% if record.status == 'tatil' %}selected{% endif %}>Dam olish</option>
                        <option value="mehnat_safari" {% if record.status == 'mehnat_safari' %}selected{% endif %}>Mehnat safari</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Izoh</label>
                    <input type="text" name="note" class="form-control form-control-sm" value="{{ record.note or '' }}">
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="top-btn"><i class="bi bi-check-lg"></i> Saqlash</button>
                <a href="/employees/attendance/records?start_date={{ start_date }}&end_date={{ end_date }}" class="top-btn">Bekor</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
