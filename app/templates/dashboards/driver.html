{% extends "base.html" %}

{% block title %}Haydovchi dashboard - TOTLI HOLVA{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="page-header mb-3">
        <div>
            <h5 class="mb-0"><i class="bi bi-truck text-primary"></i> Haydovchi dashboard</h5>
            <p class="text-muted mb-0 small">{{ driver_name }} - Bugungi faoliyat</p>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-4">
            <div class="mini-stat" style="border-left: 4px solid #1a73e8;">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="num text-primary" id="visitsCount">0</div>
                        <div class="lbl">Tashriflar</div>
                    </div>
                    <div style="width:40px;height:40px;border-radius:10px;background:#e3f2fd;color:#1a73e8;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">
                        <i class="bi bi-calendar-check"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4">
            <div class="mini-stat" style="border-left: 4px solid #2e7d32;">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="num text-success" id="completedCount">0</div>
                        <div class="lbl">Tugallangan</div>
                    </div>
                    <div style="width:40px;height:40px;border-radius:10px;background:#e8f5e9;color:#2e7d32;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">
                        <i class="bi bi-check-circle"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4">
            <div class="mini-stat" style="border-left: 4px solid #ffc107;">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="num text-warning" id="partnersCount">0</div>
                        <div class="lbl">Savdo nuqtalari</div>
                    </div>
                    <div style="width:40px;height:40px;border-radius:10px;background:#fff8e1;color:#ffc107;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">
                        <i class="bi bi-shop"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card data-table mb-3">
        <div class="card-header">
            <span class="fw-bold"><i class="bi bi-shop text-primary"></i> Savdo nuqtalari</span>
        </div>
        <div class="card-body p-0">
            <div id="partnersList" class="px-3 py-2">Yuklanmoqda...</div>
        </div>
    </div>

    <div class="mt-3">
        <a href="/map" class="top-btn btn btn-success"><i class="bi bi-geo-alt"></i> Xaritani ko'rish</a>
    </div>
</div>

<script>
(function() {
    function escHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    const token = {{ (driver_token or '') | tojson }};
    if (!token) {
        document.getElementById('partnersList').innerHTML = '<p class="text-muted">Token topilmadi. Qayta kiring.</p>';
        return;
    }
    async function load() {
        try {
            const r = await fetch('/api/driver/partners?token=' + encodeURIComponent(token));
            const d = await r.json();
            if (d.success && d.partners) {
                document.getElementById('partnersCount').textContent = d.partners.length;
                const list = document.getElementById('partnersList');
                if (d.partners.length) {
                    const items = d.partners.slice(0, 20).map(p => {
                        const balance = p.balance || 0;
                        const cls = balance >= 0 ? 'text-success' : 'text-danger';
                        return `<div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                            <div><strong>${escHtml(p.name)}</strong><br><small class="text-muted">${escHtml(p.address)}</small></div>
                            <span class="${cls}">${balance.toLocaleString()} сум</span>
                        </div>`;
                    });
                    if (d.partners.length > 20) {
                        items.push(`<p class="text-muted mt-2">... va yana ${d.partners.length - 20} ta</p>`);
                    }
                    list.innerHTML = items.join('');
                } else {
                    list.innerHTML = '<p class="text-muted">Savdo nuqtalari yo\'q</p>';
                }
            } else {
                document.getElementById('partnersList').innerHTML = '<p class="text-muted">Ma\'lumot yuklanmadi</p>';
            }
        } catch (e) {
            document.getElementById('partnersList').innerHTML = '<p class="text-danger">Yuklashda xatolik yuz berdi</p>';
        }
    }
    load();
})();
</script>
{% endblock %}
